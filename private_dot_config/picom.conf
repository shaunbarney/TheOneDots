####################################
#  picom — compositor for i3
#  Stable legacy glx backend (no experimental) = no random crashes.
#  Transparency + kernel blur (frosted glass) + rounded corners + shadow.
####################################

backend = "glx";
vsync = true;
detect-client-opacity = true;

# ── NVIDIA + GLX fullscreen-freeze fix ───────────────────────────────
# Chromium browsers (Opera/Chrome) froze on i3 `fullscreen toggle` ($mod+f)
# on the NVIDIA proprietary driver. Two documented causes/fixes:
#  1. Keep compositing fullscreen windows instead of unredirecting them —
#     the redirect<->unredirect transition is what deadlocks on NVIDIA GLX.
#  2. xrender-sync-fence syncs client draw calls; REQUIRED on nvidia + glx
#     or fullscreen/video present hangs the whole screen.
unredir-if-possible = false;
xrender-sync-fence = true;

#### Blur — kernel method (supported by the stable backend) ##########
blur-method = "kernel";
blur-kern = "11x11gaussian";
blur-background = true;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'",
  # Flameshot's capture overlay is one semi-transparent 7680x2160 window —
  # gaussian-blurring 16.6MP per frame makes the screenshot UI crawl.
  "class_g = 'flameshot'"
];

#### Rounded corners ################################################
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'"
];

#### Fading #########################################################
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
# No fade on the screenshot overlay — it must appear instantly.
fade-exclude = [
  "class_g = 'flameshot'"
];

#### Shadows ########################################################
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'",
  "class_g = 'flameshot'"
];
