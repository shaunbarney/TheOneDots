# ─────────────────────────────────────────────────────────────────────
#  tmux — Cyberdream (high-contrast, vibrant) · modern coding setup
#  Plugins via TPM. Reload: prefix + r   ·   Install new: prefix + I
# ─────────────────────────────────────────────────────────────────────

# ── Core ─────────────────────────────────────────────────────────────
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,alacritty:RGB,xterm-256color:RGB"
set -g  mouse on
set -g  history-limit 50000
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -s  escape-time 10
set -g  focus-events on
set -g  set-clipboard on
set -g  display-time 2000
set -g  display-panes-time 2000
setw -g mode-keys vi

# Prefix: default C-b plus C-a as secondary (GNU-screen style).
set -g prefix2 C-a
bind C-a send-prefix -2

# ── Keybindings ──────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "  Cyberdream config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
# Launch a Claude agent in any project (fuzzy picker popup)
bind C display-popup -E -w 80% -h 75% "tmux-claude-launch"
# Lazygit in a floating popup
bind g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
# Begin the selection only ONCE per drag. Without this guard, the anchor
# re-sets on every drag-motion event, so a multi-line selection collapses
# to just the last line. Guarding on selection_present fixes multi-line.
bind -T copy-mode-vi MouseDrag1Pane if-shell -F "#{selection_present}" "" "select-pane ; send-keys -X begin-selection"
# Mouse drag (mouse mode on): copy to the system clipboard AND keep the
# highlight visible so it's obvious it worked. Press q / Esc to dismiss.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "xclip -selection clipboard -i"
# Double / triple click select word / line and copy to clipboard.
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xclip -selection clipboard -i"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xclip -selection clipboard -i"
bind m set -g mouse \; display "mouse: #{?mouse,on,off}"

# ── Plugins (TPM) ────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'catppuccin/tmux'

# Session save / restore (survives reboots)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# extrakto — fuzzy-grab paths/words/urls from the screen  (prefix + Tab)
set -g @extrakto_key 'tab'
set -g @extrakto_split_direction 'p'
set -g @extrakto_clip_tool_run 'tmux_osc52'

# floax — floating scratch terminal (lazygit, quick shell)  (prefix + P)
set -g @floax-bind 'P'
set -g @floax-width '85%'
set -g @floax-height '85%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'white'
set -g @floax-change-path 'true'

# sessionx — fuzzy session/window switcher with preview  (prefix + O)
set -g @sessionx-bind 'O'
set -g @sessionx-window-mode 'on'
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-filter-current 'false'

# ── Theme: Catppuccin engine + Cyberdream palette, cranked to POP ────
set -g @catppuccin_flavor 'mocha'

# Load the Cyberdream palette overrides first (sets @thm_* before load).
source-file ~/.config/tmux/cyberdream.conf

# Windows: active window = NEON GREEN number block; inactive = dim grey.
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_default_fill 'number'
set -gF @catppuccin_window_number_color '#{@thm_overlay_2}'
set -gF @catppuccin_window_default_color '#{@thm_overlay_2}'
set -gF @catppuccin_window_default_background '#{@thm_surface_0}'
set -gF @catppuccin_window_default_text_color '#{@thm_fg}'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_fill 'number'
# NOTE: catppuccin v2.3 uses *_text_color as the NAME segment's BACKGROUND
# (segment fg is always @thm_fg), so set it to the dark surface, not white.
set -gF @catppuccin_window_current_number_color '#{@thm_green}'
set -gF @catppuccin_window_current_color '#{@thm_green}'
set -gF @catppuccin_window_current_text_color '#{@thm_surface_0}'
set -g @catppuccin_window_current_text ' #W'

# Each status module a different neon colour → rainbow that pops.
set -gF @catppuccin_session_color   '#{@thm_green}'
set -gF @catppuccin_directory_color '#{@thm_blue}'
set -gF @catppuccin_host_color      '#{@thm_mauve}'
set -gF @catppuccin_date_time_color '#{@thm_sky}'
set -g  @catppuccin_directory_text  ' #{b:pane_current_path}'

# Status bar layout
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 120
set -g status-right-length 160
set -gF status-style 'bg=#{@thm_bg},fg=#{@thm_fg}'
set -g status-left  '#{E:@catppuccin_status_session} '
set -g status-right '#{E:@catppuccin_status_directory}#{E:@catppuccin_status_host}#{E:@catppuccin_status_date_time}'

# Panes & messages in cyberdream colours
set -gF pane-border-style 'fg=#{@thm_overlay_0}'
set -gF pane-active-border-style 'fg=#{@thm_green}'
set -gF message-style 'bg=#{@thm_green},fg=#{@thm_bg},bold'
set -gF mode-style 'bg=#{@thm_green},fg=#{@thm_bg},bold'

# ── Initialise TPM (keep at the very bottom) ─────────────────────────
run '~/.tmux/plugins/tpm/tpm'
